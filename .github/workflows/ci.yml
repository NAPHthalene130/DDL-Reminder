name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ddl_reminder
      APP_PASSWORD: ci-password
      SESSION_SECRET: ci-session-secret
      APP_URL: http://localhost:3000
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USER: ci-user
      SMTP_PASS: ci-pass
      MAIL_FROM: DDL Reminder <reminder@example.com>
      MAIL_TO: you@example.com
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run production build
        run: npm run build
